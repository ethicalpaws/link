  <text x="550" y="192" text-anchor="middle" font-size="13" font-weight="600" fill="#aabbee">🚀 bin/link — 启动入口</text>
  <line x1="550" y1="204" x2="550" y2="228" stroke="#4455aa" stroke-width="2" marker-end="url(#arrow)" opacity=".8"/>

  <!-- L2: Gateway -->
  <rect x="30" y="232" width="1040" height="165" rx="10" fill="none" stroke="#2a2a4a" stroke-width="1" stroke-dasharray="5,3"/>
