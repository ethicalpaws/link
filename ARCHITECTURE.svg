<svg viewBox="0 0 1100 1540" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" style="background:#0d0d1a">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0006"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#4455aa"/></marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#5577bb" opacity=".5"/></marker>
  </defs>

  <rect width="1100" height="1540" rx="16" fill="#0d0d1a" stroke="#1e1e3a" stroke-width="1"/>
  <text x="550" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#8899ee" letter-spacing="2">🔗 LINK 系统架构图</text>
  <text x="550" y="56" text-anchor="middle" font-size="11" fill="#555">Long-term Intelligent Navigation Keystone — v0.1.0</text>

  <!-- L1: Config Layer -->
  <rect x="30" y="75" width="1040" height="95" rx="10" fill="none" stroke="#2a2a4a" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="50" y="95" font-size="10" fill="#555" transform="rotate(-90 35 85)">层</text>
  <rect x="80" y="82" width="310" height="78" rx="8" fill="#0d0d1a" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="106" font-size="13" font-weight="600" fill="#7788cc">⚙️ 配置层</text>
  <text x="100" y="126" font-size="11" fill="#666">link.config.js — 用户配置</text>
  <text x="100" y="144" font-size="11" fill="#666">data/*.json — 运行时持久化</text>
  <rect x="420" y="82" width="300" height="78" rx="8" fill="#0d0d1a" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
