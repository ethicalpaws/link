  <text x="440" y="144" font-size="11" fill="#666">TOOLS.md · USER.md</text>
  <rect x="750" y="82" width="300" height="78" rx="8" fill="#0d0d1a" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="770" y="106" font-size="13" font-weight="600" fill="#7788cc">🔧 扩展定义</text>
  <text x="770" y="126" font-size="11" fill="#666">tools/*.yaml — 自定义工具</text>
  <text x="770" y="144" font-size="11" fill="#666">@link/skill-* — 社区包（可选）</text>

  <line x1="390" y1="120" x2="415" y2="120" stroke="#4455aa" stroke-width="1" marker-end="url(#arrow)" opacity=".6"/>
  <line x1="550" y1="160" x2="550" y2="168" stroke="#4455aa" stroke-width="1" opacity=".6"/>

  <!-- Bootstrap -->
